name: AgentBazaar SDK Tests

on:
  push:
    paths:
      - 'sdk/**'
  pull_request:
    paths:
      - 'sdk/**'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --prefix sdk

      - name: Run unit tests
        run: npx tsx sdk/tests/sdk.test.ts

      - name: Run integration tests
        run: npx tsx sdk/tests/integration.test.ts

      - name: Run E2E demo (simulation mode)
        run: npx tsx sdk/demos/e2e-devnet.ts
