name: AgentBazaar Devnet Deploy

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'devnet'
        type: choice
        options:
          - devnet
          - testnet

jobs:
  build-and-deploy:
    name: Build Contracts & Deploy to ${{ github.event.inputs.network }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mxpy
        run: pip install multiversx-sdk-cli

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build Registry Contract
        working-directory: contracts/registry
        run: mxpy contract build

      - name: Build Escrow Contract
        working-directory: contracts/escrow
        run: mxpy contract build

      - name: Build Reputation Contract
        working-directory: contracts/reputation
        run: mxpy contract build

      - name: Deploy to Devnet
        if: github.event.inputs.network == 'devnet'
        env:
          DEVNET_PEM: ${{ secrets.DEVNET_WALLET_PEM }}
        run: |
          echo "$DEVNET_PEM" > /tmp/devnet-wallet.pem
          chmod 600 /tmp/devnet-wallet.pem
          ./devnet/deploy.sh --pem /tmp/devnet-wallet.pem
          rm -f /tmp/devnet-wallet.pem

      - name: Upload Deploy Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-outputs-${{ github.event.inputs.network }}
          path: |
            devnet/*.json
            contracts/*/output/*.wasm
          retention-days: 30

      - name: Commit Updated Addresses
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add devnet/multiversx.json devnet/*.json
          git diff --staged --quiet || git commit -m "chore(devnet): update deployed contract addresses [skip ci]"
          git push
