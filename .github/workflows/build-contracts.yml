name: Build & Lint Contracts

on:
  push:
    branches: [main, develop]
    paths:
      - 'contracts/**'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'

jobs:
  build:
    name: Build Rust Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install mxpy
        run: pip install multiversx-sdk-cli

      - name: Build Registry
        working-directory: contracts/registry
        run: mxpy contract build

      - name: Build Escrow
        working-directory: contracts/escrow
        run: mxpy contract build

      - name: Build Reputation
        working-directory: contracts/reputation
        run: mxpy contract build

      - name: Clippy — Registry
        working-directory: contracts/registry
        run: cargo clippy -- -D warnings

      - name: Clippy — Escrow
        working-directory: contracts/escrow
        run: cargo clippy -- -D warnings

      - name: Clippy — Reputation
        working-directory: contracts/reputation
        run: cargo clippy -- -D warnings

      - name: Rustfmt Check
        run: |
          cargo fmt --manifest-path contracts/registry/Cargo.toml -- --check
          cargo fmt --manifest-path contracts/escrow/Cargo.toml -- --check
          cargo fmt --manifest-path contracts/reputation/Cargo.toml -- --check
